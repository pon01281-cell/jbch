    // --- Web Audio API 기반 성스러운 신디사이저 효과음 엔진 ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        if (type === 'splash') {
          // 바다 깊이 묵직하게 가라앉으며 퍼지는 파동 효과음
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, now);
          osc.frequency.exponentialRampToValueAtTime(28, now + 1.3);
          
          gain.gain.setValueAtTime(0.45, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 1.3);
          
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.4);
        } else if (type === 'chime') {
          // 맑고 청아한 천상의 하모니 종소리 (단계 마일스톤 도달)
          const notes = [523.25, 659.25, 783.99, 1046.50]; // 도, 미, 솔, 도
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.12);
            
            gain.gain.setValueAtTime(0.18, now + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.12 + 0.85);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.12);
            osc.stop(now + idx * 0.12 + 0.95);
          });
        } else if (type === 'triumph') {
          // 전단계 참회 완료 시 울려퍼지는 찬란한 구원 팡파레
          const chords = [261.63, 329.63, 392.00, 523.25];
          chords.forEach((freq) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.8, now + 2.0);
            
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(now + 2.5);
          });
        }
      } catch (e) {
        console.warn("오디오 엔진 동작 비활성화:", e);
      }
    };

            dbRef.current = db;
            setIsOnline(true);

            // A. 익명 로그인 활성화

                setIsOnline(false);
              });

            // B. 사회자 통제 진도 리스너 연결
            const sessionRef = db.collection('artifacts').doc(appId).collection('public').doc('session');

              if (doc.exists && doc.data().currentStage !== undefined) {
                setGlobalStage(doc.data().currentStage);

                sessionRef.set({ currentStage: 1 });

            });

            const unsubParticipants = db.collection('artifacts').doc(appId).collection('participants')

            const unsubSurrenders = db.collection('artifacts').doc(appId).collection('surrenders')

                const list = [];

            };

        const catObj = SURRENDER_CATEGORIES.find(c => c.id === selectedCategory);

                  category: selectedCategory,
                  stage: stageNum,
                  nickname: nickname,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }

            // 로컬용 기재 처리
            setParticipants(prev => 
              prev.map(p => p.id === 'local_me' ? { ...p, currentStage: nextStage, items: updatedHistory } : p)

              text: textToThrow,
              category: selectedCategory,
              stage: stageNum,
              nickname: nickname

        const activePeople = participants.filter(p => p.nickname);

        const readyForNext = activePeople.filter(p => p.currentStage > globalStage).length;
        const totalCompletedSurrenders = activePeople.reduce((acc, curr) => acc + (curr.currentStage - 1), 0);
        const maxPossibleSurrenders = activePeople.length * 7;
        
        const continuousRatio = maxPossibleSurrenders > 0 ? (totalCompletedSurrenders / maxPossibleSurrenders) : 0;
        const continuousStage = continuousRatio * 7; 

        return {
          avgStage: continuousStage, 
          totalPeople: activePeople.length,
          totalSurrenders: totalCompletedSurrenders,
          stageReadyCount: readyForNext
        };

                {/* 타이타닉 실물 렌더링 */}
                <div className="flex-1 flex flex-col justify-center items-center w-full my-auto">
                  {renderTitanicVisual(false)}
                </div>

                {/* 안내바 */}
                <div className="w-full max-w-4xl mx-auto text-center z-25 py-4 bg-slate-900/80 border border-white/10 rounded-2xl backdrop-blur px-6 relative shadow-2xl mb-10">
                  <button onClick={() => setRole('select')} className="absolute top-2 right-3 text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-500">나가기</button>
                  
                  <div className="flex justify-center gap-6 text-[10px] text-cyan-400 font-bold mb-1.5">
                    <span>👥 탑승 성도: {stats.totalPeople}명</span>
                    <span>🌊 총 참회 투하량: {stats.totalSurrenders}회</span>
                    <span>📈 배의 가벼움도: {((currentVisualStage / 7) * 100).toFixed(1)}%</span>
                  </div>

                  <span className="text-[9px] font-black text-cyan-300 block mb-1 uppercase tracking-wider">참회와 기도의 대항해</span>
                  <p className="text-xs text-slate-200 font-bold">
                    {currentVisualStage <= 1.2 ? "우리의 마음의 타이타닉이 무거운 죄에 깔려 반쯤 바다에 잠겨 있습니다. 무거운 우상들을 성찰해 주십시오." : "성도들의 참회가 바다를 뒤흔듭니다. 마음의 타이타닉이 가벼워져 조금씩 물 위로 올라오고 있습니다!"}
                  </p>
                </div>
              </div>
            ) : role === 'host' ? (
              /* =====================================================================================
                 [3. 사회자용 제어 판넬]
                 ===================================================================================== */
              <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden">
                <div className="lg:col-span-8 relative flex flex-col bg-slate-950/50 p-4 border-r border-white/5 justify-between">
                  <div className="absolute top-4 left-4 z-20 bg-slate-900/95 border border-white/10 p-3.5 rounded-xl max-w-sm">
                    <span className="text-[10px] text-indigo-400 font-bold block">🖥️ 스크린 실시간 프리뷰</span>
                    <span className="text-xs text-slate-300 font-bold">대강당의 잠수 깊이를 동일하게 모니터링합니다.</span>
                  </div>
                  <div className="flex-1 flex flex-col justify-center items-center w-full my-auto">
                    {renderTitanicVisual(true)}
                  </div>
                </div>

                <div className="lg:col-span-4 flex flex-col bg-slate-900/95 p-4 space-y-4 overflow-y-auto font-medium">
                  <div className="bg-slate-950 border border-indigo-500/30 p-4 rounded-xl space-y-3">
                    <span className="text-[10px] font-bold text-indigo-400 block">🔒 실시간 진도 잠금 해제</span>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={() => updateGlobalStage(globalStage - 1)} disabled={globalStage === 1} className="py-2 bg-slate-900 rounded-lg text-xs font-bold border disabled:opacity-30">이전 단계</button>
                      <button onClick={() => updateGlobalStage(globalStage + 1)} disabled={globalStage === 7} className="py-2 bg-indigo-600 rounded-lg text-xs font-black disabled:opacity-30">다음 개방 ({globalStage+1}단계) 🔓</button>
                    </div>
                  </div>

                  <div className="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                    <div>
                      <h4 className="text-xs font-bold text-slate-300">수련회 시뮬레이터</h4>
                      <p className="text-[9px] text-slate-500">가상 성찰 데이터 주입</p>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={injectMockParticipants} className="px-2 py-1 bg-indigo-900 text-indigo-100 rounded text-[10px] font-bold">모의 인원 주입</button>
                      <button onClick={resetAllSessions} className="px-2 py-1 bg-red-950 text-red-300 rounded text-[10px] font-bold">리셋</button>
                    </div>
                  </div>

                  <div className="space-y-2">
                    <span className="text-xs font-bold text-slate-400">📝 흘러가는 죄 고백 목록 ({surrenders.length}건)</span>
                    <button onClick={handleForceTestFloat} className="text-[10px] text-cyan-400 hover:underline block font-bold">+ 종이카드 가상 투하 테스트</button>
                    <div className="bg-black/50 border rounded-xl max-h-[140px] overflow-y-auto p-2">
                      {surrenders.map((s, idx) => (
                        <div key={idx} className="text-[10px] p-1 border-b border-white/5 font-semibold text-slate-300">[{s.category}] "{s.text}" - {s.nickname}</div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              /* =====================================================================================
                 [4. 참가자 모바일 화면]
                 ===================================================================================== */
              <div className="flex-1 max-w-lg w-full mx-auto px-4 py-6 flex flex-col justify-between">
                {!hasRegistered ? (
                  <div className="my-auto bg-slate-900/70 border p-6 rounded-2xl space-y-4 shadow-2xl">
                    <h3 className="text-lg font-bold text-white text-center">마음의 타이타닉 탑승</h3>
                    <p className="text-xs text-slate-400 leading-relaxed text-center">
                      본인의 수련회 조와 이름을 정확히 적고 예식에 참여하십시오. <br />
                      고백을 적고 던질 때마다 대강당 화면의 배가 실시간으로 수면 위로 날아오릅니다.
                    </p>
                    <form onSubmit={handleJoinRetreat} className="space-y-4">
                      <input type="text" placeholder="예: 3조 김성찰" value={nickname} onChange={e=>setNickname(e.target.value)} required className="w-full bg-slate-950 border rounded-xl px-4 py-3 text-xs" />
                      <button type="submit" className="w-full py-3 bg-cyan-600 text-white font-bold text-xs rounded-xl">예식 참여하기</button>
                    </form>
                  </div>
                ) : myCurrentStage <= 7 ? (
                  myCurrentStage > globalStage ? (
                    <div className="my-auto bg-slate-900/60 border p-8 rounded-2xl text-center space-y-4 shadow-2xl">
                      <div className="text-2xl animate-pulse">⏳</div>
                      <h3 className="text-sm font-bold text-cyan-300">{myCurrentStage-1}단계 완료!</h3>
                      <p className="text-xs text-slate-300 font-bold">사회자님이 다음 단계를 열어주실 때까지 침묵하며 묵상합시다.</p>
                    </div>
                  ) : (
                    <div className="space-y-4 pb-10">
                      <span className="text-xs font-bold text-cyan-300 block">{myCurrentStage}단계 우상 선택</span>
                      <div className="grid grid-cols-3 gap-1.5 max-h-[150px] overflow-y-auto p-1 bg-slate-900/40 rounded-xl">
                        {SURRENDER_CATEGORIES.map(c => (
                          <div key={c.id} onClick={()=>{ setSelectedCategory(c.id); playThrottledSound('chime'); }} className={`p-2 rounded-xl border text-center cursor-pointer text-xs ${selectedCategory===c.id ? 'bg-cyan-500/20 border-cyan-400 text-white':'bg-slate-950/60 border-white/5 text-slate-400'}`}>
                            {c.icon} {c.title}
                          </div>
                        ))}
                      </div>
                      {selectedCategory && (
                        <div className="space-y-2">
                          <p className="text-[10px] text-slate-400 italic bg-black/40 p-2.5 rounded font-medium">{SURRENDER_CATEGORIES.find(c=>c.id===selectedCategory)?.examples}</p>
                          <textarea rows="2" placeholder="주님 앞에 내려놓을 사연을 적으세요..." value={confessionText} onChange={e=>setConfessionText(e.target.value)} className="w-full bg-slate-950 border rounded-xl p-3 text-xs" />
                          <button onClick={handleThrowConfession} className="w-full py-3 bg-cyan-600 text-white rounded-xl text-xs font-bold">🌊 바다 깊숙이 던져버리기</button>
                        </div>
                      )}
                    </div>
                  )
                ) : (
                  <div className="my-auto bg-slate-900/70 border border-emerald-500/30 p-8 rounded-2xl text-center space-y-4 shadow-2xl mb-10">
                    <span className="text-3xl">✨</span>
                    <h3 className="text-base font-bold text-emerald-400">7단계 해방 예식 완료!</h3>
                    <p className="text-xs text-slate-300 font-bold">모든 짐을 훌륭히 주님 앞에 버렸습니다! <br />이제 조원들과 함께 전면 대형 스크린을 바라보며 마음 모아 기도합시다.</p>
                  </div>
                )}
              </div>
            )}
          </main>

          <style>{`
            @keyframes wave {
              0% { transform: translateX(0) translateZ(0) scaleY(1); }
              50% { transform: translateX(-25%) translateZ(0) scaleY(0.96); }
              100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
            }
            @keyframes fling-arc-custom {
              0% { left: 50%; top: 40%; transform: translate3d(-50%, -50%, 0) rotate(0deg) scale(0.3); opacity: 0; }
              10% { opacity: 1; }
              35% { top: var(--apex-y); left: var(--apex-x); transform: translate3d(-50%, -50%, 0) rotate(var(--rot-mid)) scale(1.15); }
              90% { opacity: 0.95; }
              100% { left: var(--target-x); top: 70%; transform: translate3d(-50%, -50%, 0) rotate(var(--rot-end)) scale(0.4); opacity: 0; }
            }
            @keyframes splash-ripple {
              0% { transform: scale(0.1); opacity: 1; border-width: 4px; }
              100% { transform: scale(1.6); opacity: 0; border-width: 1px; }
            }
            @keyframes droplet-1 {
              0% { transform: translate3d(0,0,0) scale(1); opacity: 1; }
              40% { transform: translate3d(-20px,-45px,0) scale(1.3); }
              100% { transform: translate3d(-30px,20px,0) scale(0.4); opacity:0; }
            }
            @keyframes droplet-2 {
              0% { transform: translate3d(0,0,0) scale(1); opacity: 1; }
              40% { transform: translate3d(0,-60px,0) scale(1.3); }
              100% { transform: translate3d(0,20px,0) scale(0.4); opacity:0; }
            }
            @keyframes droplet-3 {
              0% { transform: translate3d(0,0,0) scale(1); opacity: 1; }
              40% { transform: translate3d(20px,-45px,0) scale(1.3); }
              100% { transform: translate3d(30px,20px,0) scale(0.4); opacity:0; }
            }
            @keyframes float-up-bubble {
              0% { transform: translate3d(0, 160px, 0) scale(0.7); opacity: 0; filter: blur(2px); }
              8% { opacity: 1; filter: blur(0); }
              90% { opacity: 0.95; }
              100% { transform: translate3d(var(--float-x, 0px), -80vh, 0) scale(1.05); opacity: 0; filter: blur(4px); }
            }
          `}</style>

          {toastMessage && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 border border-cyan-500/50 text-cyan-200 px-5 py-3 rounded-xl shadow-2xl text-xs font-bold text-center animate-bounce">
              💡 {toastMessage}
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
