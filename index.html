  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Gemini API 연동 키 (환경에 의해 자동 처리됨) ---
    const apiKey = "";
    
    const callGeminiAPI = async (promptText) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: promptText }] }],
        systemInstruction: { parts: [{ text: "당신은 교회 수련회에서 성도들의 회개와 결단을 돕고 따뜻하게 위로하는 영적 상담가이자 따뜻한 목회자입니다. 항상 한국어로 다정하고 은혜롭게 답변합니다. 사용자가 고백을 하면 그에 맞는 성경적 위로나 기도를 해주세요." }] }
      };

      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답을 생성하지 못했습니다.";
        } catch (error) {
          if (i === 4) {
            console.error("Gemini API Error:", error);
            return "현재 AI 위로의 말씀을 불러올 수 없습니다. 마음을 다해 함께 기도하겠습니다.";
          }
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    };

    // --- 🌟 제공해주신 Firebase Config 완벽 이식 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD9m0omYwWSsdpWyAIjHqHE_6ZHxnDQ8F4",
      authDomain: "church-71d03.firebaseapp.com",
      projectId: "church-71d03",
      storageBucket: "church-71d03.firebasestorage.app",
      messagingSenderId: "700068495005",
      appId: "1:700068495005:web:43a7cc6cc6721510ac1e74",
      measurementId: "G-4LY0TV8LQN"
    };

    // --- Web Audio API 기반 효과음 엔진 ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        if (type === 'splash') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, now);
          osc.frequency.exponentialRampToValueAtTime(28, now + 1.3);
          gain.gain.setValueAtTime(0.45, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 1.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.4);
        } else if (type === 'chime') {
          const notes = [523.25, 659.25, 783.99, 1046.50]; 
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.12);
            gain.gain.setValueAtTime(0.18, now + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.12 + 0.85);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.12);
            osc.stop(now + idx * 0.12 + 0.95);
          });
        } else if (type === 'triumph') {
          const chords = [261.63, 329.63, 392.00, 523.25];
          chords.forEach((freq) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.8, now + 2.0);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(now + 2.5);
          });
        }
      } catch (e) {
        console.warn("오디오 엔진 비활성화:", e);
      }
    };

    // --- 🌟 사진 기반 13가지 성찰 카테고리 정의 (정확히 타이핑) ---
    const SURRENDER_CATEGORIES = [
      { id: 'word', title: '말씀', icon: '📖', examples: '읽기/ 듣기/ 암송/ 묵상/ 순종,실천함으로 내 말씀으로 만들기/ 말씀으로 단련 받기/ 위로 받기/ 복음 말씀 듣고 구원받음을 감사하기 등' },
      { id: 'prayer', title: '기도', icon: '🙏', examples: '매일 하는 기도/ 회개 기도/ 영혼을 위한 기도/ 순종하기 위한 기도/ 감사 기도/ 진보하기 위한 기도/ 마음을 지키기 위한 기도/ 교회를 위한 기도/ 하나님께 먼저 여쭤보는 기도/ 믿음으로 하는 기도 등' },
      { id: 'church', title: '교회', icon: '⛪', examples: '육신을 이기고, 마음을 열고 교제 참석하기/ 회복하려는 마음/ 우선순위 교회가 먼저/ 교회를 위한 희생/ 형제&자매님과의 교제/ 서로 돌아봄 (관심,도움,사랑)/ 합심해서 주님의 일 하기/ 교회가 하나됨을 지키기/ 용서/ 봉사/ 위치,질서 지키기/ 헌금 등' },
      { id: 'evangelism', title: '전도', icon: '📣', examples: '영혼을 사랑하는 마음 갖기/ 관심 갖기/ 말씀 권유/ 물질 사용/ 간절한 눈물의 기도부탁/ 포기하지 않고 끝까지 전도/ 담대히 전도/ 고난을 감내하는 전도 등' },
      { id: 'reward', title: '상급', icon: '👑', examples: '이 세상의 좋은 것들 보다 상급, 하늘의 것을 사모함/ 그리스도인의 심판대를 기억함/ 칭찬, 영광 받음을 위해 희생함/ 죄를 두려워 함/ 복종/ 나를 버리고 주님만 나타냄 등' },
      { id: 'career', title: '직장/학업', icon: '💼', examples: '명예/ 사회적 위치/ 인정받고 싶은 마음/ 승진/ 노후 준비/ 성취감/ 안정된 삶/ 성공/ 아르바이트/ 학점/ 꿈/ 재능/ 성취감/ 미래에 대한 준비 등' },
      { id: 'money', title: '돈', icon: '💵', examples: '안정적이고 돈에 대한 걱정이 없는 삶/ 탐심/ 연봉/ 월세/ 적금/ 결혼자금/ 부모님 용돈/ 내가 먹고 싶은 것/ 내가 사고 싶은 것 (신발,옷,워치,노트북,신상품,차)/ 나를 위한 투자/ 등' },
      { id: 'flesh', title: '육신', icon: '🏋️', examples: '운동/ 건강 관리/ 외모(얼굴,몸매, 피부 등의 관리)/ 귀찮음/ 게으름/ 육신적 쾌락을 즐김/ 패션/ 식욕/ 성욕/ 수면욕 등' },
      { id: 'nature', title: '본성', icon: '👤', examples: '내 성격/ 내 생각/ 내 고집/ 내 계획/ 자존심/ 이기심/ 교만함/ 나태함/ 시기/ 질투/ 험담/ 사나움/ 미워함/ 판단함/ 자랑함/ 거짓말함 등' },
      { id: 'hobby', title: '취미', icon: '🎮', examples: '간식 먹으며 넷플릭스/ 침대에 누워서 유튜브/ 자기 전 웹툰/ 인스타/ 친구들과 맛집 탐방/ 영화,전시회,콘서트 등 문화생활/ 게임/ 쇼핑/ 드라이브/ 강아지와 놀기 등' },
      { id: 'family', title: '가족', icon: '🏡', examples: '아빠/ 엄마/ 남편/ 미래의 배우자/ 자녀/ 가족과의 즐거운 시간/ 혈육 등' },
      { id: 'friend', title: '친구', icon: '🤝', examples: '인정/ 우정/ 함께 즐기는/ 사람 관계/ 소속감/ 내 편/ 단짝 친구 등' },
      { id: 'comfort', title: '편안함', icon: '🛌', examples: '잠/ 휴식/ 컨디션 회복/ 멍 때리기/ 누워있기/ 혼자만의 시간/ 침대와 한 몸/ 나만의 시간/ 노터치 등' }
    ];

    function App() {
      const appId = 'titanic-church-app-v10';
      const [user, setUser] = useState(null);
      const [isOnline, setIsOnline] = useState(false);
      const [loading, setLoading] = useState(true);

      const [role, setRole] = useState('select'); // select, screen, host, participant
      const [globalStage, setGlobalStage] = useState(1);
      const [participants, setParticipants] = useState([]);
      const [surrenders, setSurrenders] = useState([]);

      const [hostMode, setHostMode] = useState('collective');
      const [selectedParticipantId, setSelectedParticipantId] = useState(null);
      const [manualStage, setManualStage] = useState(0); 

      const [nickname, setNickname] = useState('');
      const [hasRegistered, setHasRegistered] = useState(false);
      const [myCurrentStage, setMyCurrentStage] = useState(1);
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [confessionText, setConfessionText] = useState('');
      const [myHistory, setMyHistory] = useState([]);
      const [isThrowing, setIsThrowing] = useState(false);

      const [flingingCards, setFlingingCards] = useState([]);
      const [splashes, setSplashes] = useState([]);
      const [floatingWords, setFloatingWords] = useState([]);
      
      // 탑승객 명단 팝업 표시 토글
      const [showPassengerList, setShowPassengerList] = useState(false);

      // ✨ Gemini AI 기능 상태
      const [comfortMessage, setComfortMessage] = useState('');
      const [isGeneratingComfort, setIsGeneratingComfort] = useState(false);
      const [showComfortModal, setShowComfortModal] = useState(false);
      const [hostPrayer, setHostPrayer] = useState('');
      const [isGeneratingPrayer, setIsGeneratingPrayer] = useState(false);

      const [customConfirm, setCustomConfirm] = useState({ isOpen: false, message: "", onConfirm: null });

      const isInitialLoadRef = useRef(true);
      const seenSurrenderIdsRef = useRef(new Set());
      const lastAudioTimeRef = useRef(0);
      const dbRef = useRef(null);
      const slotRef = useRef(0);

      const [toastMessage, setToastMessage] = useState('');
      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 4000);
      };

      // --- 🌟 Firebase 실시간 엔진 초기화 ---
      useEffect(() => {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          const auth = firebase.auth();
          const db = firebase.firestore();
          dbRef.current = db;
          
          auth.signInAnonymously()
            .then(() => setIsOnline(true))
            .catch((err) => {
              console.error("Firebase 로그인 실패:", err);
              if(err.code === 'auth/operation-not-allowed') {
                showToast("❌ Firebase 콘솔에서 'Authentication -> 익명 로그인'을 켜주세요!");
              } else {
                showToast("❌ 인터넷 연결 오류. 로컬 모드로 동작합니다.");
              }
              setIsOnline(false);
            });

          const unsubscribeAuth = auth.onAuthStateChanged((u) => {
            if (u) {
              setUser(u);
              setLoading(false);
            } else {
              setLoading(false);
            }
          });

          return () => unsubscribeAuth();
        } catch (e) {
          console.error("Firebase 초기화 에러:", e);
          setIsOnline(false);
          setLoading(false);
        }
      }, []);

      // --- 🌟 실시간 데이터베이스 연동 ---
      useEffect(() => {
        if (!isOnline || !user || !dbRef.current) return;

        const sessionRef = dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session');
        const unsubSession = sessionRef.onSnapshot((docSnap) => {
          if (docSnap.exists && docSnap.data().currentStage !== undefined) {
            setGlobalStage(docSnap.data().currentStage);
          } else {
            sessionRef.set({ currentStage: 1 });
          }
        }, err => console.log("규칙 설정 오류:", err));

        const partsRef = dbRef.current.collection('artifacts').doc(appId).collection('participants');
        const unsubParticipants = partsRef.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((d) => list.push({ id: d.id, ...d.data() }));
          setParticipants(list);
        });

        const surrRef = dbRef.current.collection('artifacts').doc(appId).collection('surrenders');
        const unsubSurrenders = surrRef.onSnapshot((snapshot) => {
          const list = [];
          const newItems = [];

          snapshot.forEach((d) => {
            const docId = d.id;
            const data = d.data();
            list.push({ id: docId, ...data });

            if (isInitialLoadRef.current) {
              seenSurrenderIdsRef.current.add(docId);
            } else {
              if (!seenSurrenderIdsRef.current.has(docId)) {
                seenSurrenderIdsRef.current.add(docId);
                newItems.push({ id: docId, ...data });
              }
            }
          });

          if (isInitialLoadRef.current) isInitialLoadRef.current = false;

          list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
          setSurrenders(list);

          newItems.forEach((item, index) => {
            setTimeout(() => { triggerPhysicalLaunch(item); }, index * 500); 
          });
        });

        return () => {
          unsubSession();
          unsubParticipants();
          unsubSurrenders();
        };
      }, [isOnline, user]);

      const playThrottledSound = (type) => {
        const now = Date.now();
        if (now - lastAudioTimeRef.current > 150) {
          playSound(type);
          lastAudioTimeRef.current = now;
        }
      };

      // --- 물리 애니메이션 (다중 구역 2초 체공 후 팝업) ---
      const triggerPhysicalLaunch = (item) => {
        const flingId = `fling_${Date.now()}_${Math.random()}`;
        
        const slotIndex = slotRef.current % 6;
        slotRef.current += 1;
        
        const row = Math.floor(slotIndex / 3); 
        const col = slotIndex % 3; 
        
        const hoverX = 20 + (col * 30) + (Math.random() * 6 - 3); 
        const hoverY = 15 + (row * 25) + (Math.random() * 8 - 4); 
        const dropX = hoverX;

        const categoryObj = SURRENDER_CATEGORIES.find(c => c.id === item.category);

        const newCard = {
          id: flingId, 
          text: item.text, 
          categoryTitle: categoryObj?.title || '성찰',
          categoryIcon: categoryObj?.icon || '⚓', 
          nickname: item.nickname || '익명성도',
          hoverX: `${hoverX}%`, 
          hoverY: `${hoverY}%`, 
          dropX: `${dropX}%`
        };

        // 카드 생성
        setFlingingCards(prev => [...prev.slice(-15), newCard]);

        // 2초 체공 후 드롭 시점에 물보라 충돌
        setTimeout(() => {
          const splashId = `splash_${Date.now()}_${Math.random()}`;
          setSplashes(prev => [...prev, { id: splashId, x: `${dropX}%` }]);
          playThrottledSound('splash');

          setTimeout(() => setSplashes(prev => prev.filter(s => s.id !== splashId)), 1000);

          setTimeout(() => {
            const bubbleId = `bubble_${Date.now()}_${Math.random()}`;
            const riseDuration = 8 + Math.random() * 3;

            const newBubble = {
              id: bubbleId, text: item.text, categoryTitle: categoryObj?.title || '성찰',
              nickname: item.nickname || '익명', x: `${dropX}%`, size: 16 + Math.random() * 6, duration: riseDuration
            };

            setFloatingWords(prev => [...prev, newBubble]);
            setTimeout(() => setFloatingWords(prev => prev.filter(b => b.id !== bubbleId)), riseDuration * 1000);
          }, 200);

        }, 2200);

        // 2.7초에 카드 완전 삭제
        setTimeout(() => {
          setFlingingCards(prev => prev.filter(c => c.id !== flingId));
        }, 2700);
      };

      const updateGlobalStage = (nextVal) => {
        if (nextVal < 1 || nextVal > 7) return;
        playThrottledSound('chime');
        setGlobalStage(nextVal);

        if (isOnline && dbRef.current) {
          dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session')
            .update({ currentStage: nextVal }).catch(e => console.log(e));
        } else {
          showToast(`단계를 ${nextVal}단계로 변경했습니다.`);
        }
      };

      // 🌟 참가자: 배에서 내리기 (하차/삭제)
      const handleDisembark = () => {
        setCustomConfirm({
          isOpen: true,
          message: "정말로 배에서 내리시겠습니까? 탑승 기록이 삭제되며 처음 화면으로 돌아갑니다.",
          onConfirm: async () => {
            if (isOnline && dbRef.current && user) {
              await dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).delete();
            } else {
              setParticipants(prev => prev.filter(p => p.id !== 'local_me'));
            }
            setHasRegistered(false);
            setNickname('');
            setMyCurrentStage(1);
            setMyHistory([]);
            setRole('select');
            setCustomConfirm({ isOpen: false, message: "", onConfirm: null });
            showToast("배에서 안전하게 하차하셨습니다.");
          }
        });
      };

      const handleThrowConfession = () => {
        if (!selectedCategory || !confessionText.trim()) return;

        setIsThrowing(true);
        const textToThrow = confessionText.trim();
        const catObj = SURRENDER_CATEGORIES.find(c => c.id === selectedCategory);
        const stageNum = myCurrentStage;

        setTimeout(() => {
          const newSurrenderItem = { category: selectedCategory, categoryTitle: catObj?.title || '소중한 것', text: textToThrow, stage: stageNum };
          const updatedHistory = [...myHistory, newSurrenderItem];
          setMyHistory(updatedHistory);

          const nextStage = myCurrentStage + 1;
          setMyCurrentStage(nextStage);
          setSelectedCategory(null);
          setConfessionText('');
          setIsThrowing(false);

          if (nextStage === 8) playThrottledSound('triumph');
          else playThrottledSound('chime');

          // Gemini 위로의 말씀 요청
          setShowComfortModal(true);
          setIsGeneratingComfort(true);
          setComfortMessage('');
          callGeminiAPI(`다음은 한 성도가 주님을 위해 십자가 앞에 내려놓은 고백입니다: "${textToThrow}". 이 성도를 위해 성경적이고 따뜻한 위로의 말과 짧은 축복의 기도를 3문장 이내로 다정하게 작성해주세요.`)
            .then(msg => {
              setComfortMessage(msg);
              setIsGeneratingComfort(false);
            });

          if (isOnline && dbRef.current && user) {
            dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).set({
              nickname: nickname, currentStage: nextStage, items: updatedHistory, lastActive: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            dbRef.current.collection('artifacts').doc(appId).collection('surrenders').add({

        const continuousRatio = maxPossibleSurrenders > 0 ? (totalCompletedSurrenders / maxPossibleSurrenders) : 0;
        const continuousStage = continuousRatio * 7; 

        return { avgStage: continuousStage, totalPeople: activePeople.length, totalSurrenders: totalCompletedSurrenders, stageReadyCount: readyForNext };

                </div>

                <div className="w-full max-w-4xl mx-auto text-center z-25 py-6 bg-slate-900/80 border border-white/10 rounded-2xl backdrop-blur px-8 relative shadow-2xl mb-4">
                  <button onClick={() => setRole('select')} className="absolute top-2 left-3 text-xs bg-white/5 px-3 py-1 rounded text-slate-500">나가기</button>
                  <p className="text-xl text-slate-200 font-bold leading-relaxed">
                    마음의 타이타닉이 바다속으로 가라앉고 있습니다.<br/>나의 소중한 것들을 하나씩 버려주세요.
                  </p>
                </div>
              </div>
            ) : role === 'host' ? (
              /* [3. 사회자용 제어 판넬] */
              <div className="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden font-sans min-h-[90vh]">
                <div className="lg:col-span-8 relative flex flex-col bg-slate-950/50 p-6 border-r border-white/5 justify-between">
                  <div className="absolute top-6 left-6 z-20 bg-slate-900/95 border p-4 rounded-xl max-w-sm">
                    <span className="text-sm text-indigo-400 font-bold block">🖥️ 스크린 실시간 프리뷰</span>
                  </div>
                  <div className="flex-1 flex flex-col justify-center items-center w-full my-auto">
                    {renderTitanicVisual(true)}
                  </div>
                </div>

                <div className="lg:col-span-4 flex flex-col bg-slate-900/95 p-6 space-y-6 overflow-y-auto font-medium">
                  <div className="bg-slate-950 border border-indigo-500/30 p-6 rounded-2xl space-y-4">
                    <span className="text-sm font-bold text-indigo-400 block">🔒 실시간 진도 잠금 해제</span>
                    <div className="grid grid-cols-2 gap-3">
                      <button onClick={() => updateGlobalStage(globalStage - 1)} disabled={globalStage === 1} className="py-3 bg-slate-900 rounded-xl text-sm font-bold border disabled:opacity-30">이전 단계</button>
                      <button onClick={() => updateGlobalStage(globalStage + 1)} disabled={globalStage === 7} className="py-3 bg-indigo-600 rounded-xl text-sm font-black disabled:opacity-30">다음 개방 ({globalStage+1}단계) 🔓</button>
                    </div>
                  </div>

                  <div className="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                      <h4 className="text-sm font-bold text-slate-300">수련회 시뮬레이터</h4>
                      <p className="text-xs text-slate-500">가상 데이터 주입</p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={injectMockParticipants} className="px-3 py-2 bg-indigo-900 text-indigo-100 rounded-lg text-xs font-bold">모의 인원 주입</button>
                      <button onClick={triggerResetSessions} className="px-3 py-2 bg-red-950 text-red-300 rounded-lg text-xs font-bold">리셋</button>
                    </div>
                  </div>

                  {/* ✨ Gemini AI 목회자 기도문 생성기 */}
                  <div className="bg-indigo-950/40 border border-indigo-500/30 p-5 rounded-2xl space-y-4 shadow-lg">
                    <span className="text-sm font-bold text-indigo-300 flex items-center gap-2">✨ AI 대표 기도문 자동 생성</span>
                    <button onClick={generateHostPrayer} disabled={isGeneratingPrayer} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold transition disabled:opacity-50">
                      {isGeneratingPrayer ? '✨ 기도문 작성 중...' : '회중 기도문 생성하기'}
                    </button>
                    {hostPrayer && (
                      <div className="mt-4 p-4 bg-slate-900 rounded-xl border border-white/10 text-sm text-slate-200 leading-relaxed whitespace-pre-wrap">
                        {hostPrayer}
                      </div>
                    )}
                  </div>

                  <div className="space-y-3">
                    <span className="text-sm font-bold text-slate-400">📝 흘러가는 고백 목록 ({surrenders.length}건)</span>
                    <button onClick={handleForceTestFloat} className="text-xs text-cyan-400 hover:underline block font-bold">+ 종이카드 가상 투하 테스트</button>
                    <div className="bg-black/50 border rounded-2xl max-h-[300px] overflow-y-auto p-4 space-y-2">
                      {surrenders.map((s, idx) => (
                        <div key={idx} className="text-xs p-2 border-b border-white/5 font-semibold text-slate-300">[{s.category}] "{s.text}" - {s.nickname}</div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              /* [4. 참가자 모바일 화면] */
              <div className="flex-1 max-w-2xl w-full mx-auto px-6 py-10 flex flex-col justify-between">
                
                {/* 🌟 상단: 배에서 내리기 버튼 (참가자 전용) */}
                {hasRegistered && (
                  <div className="flex justify-end mb-4">
                    <button onClick={handleDisembark} className="bg-red-950/80 text-red-300 border border-red-500/30 px-4 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-red-900 transition">
                      🚪 배에서 내리기
                    </button>
                  </div>
                )}

                {!hasRegistered ? (
                  <div className="my-auto bg-slate-900/80 border p-10 rounded-3xl space-y-6 shadow-2xl">
                    <h3 className="text-2xl sm:text-3xl font-black text-white text-center">마음의 타이타닉 탑승</h3>
                    <form onSubmit={handleJoinRetreat} className="space-y-6 mt-6">
                      <input type="text" placeholder="이름을 입력하세요 (예: 김요한)" value={nickname} onChange={e=>setNickname(e.target.value)} required className="w-full bg-slate-950 border border-slate-600 rounded-2xl px-6 py-5 text-xl text-center font-bold" />
                      <button type="submit" className="w-full py-5 bg-cyan-600 hover:bg-cyan-500 text-white font-extrabold text-2xl rounded-2xl transition">탑승하기</button>
                    </form>
                  </div>
                ) : myCurrentStage <= 7 ? (
                  /* 🌟 참가자 대기 락스크린 (myCurrentStage > globalStage) */
                  myCurrentStage > globalStage ? (
                    <div className="my-auto bg-slate-900/80 border-2 border-cyan-500/30 p-10 rounded-3xl text-center space-y-6 shadow-2xl">
                      <div className="text-6xl animate-pulse">⏳</div>
                      <h3 className="text-3xl font-black text-cyan-300">제출 완료!</h3>
                      <div className="space-y-3 bg-black/40 p-6 rounded-2xl">
                        <p className="text-lg text-slate-300 font-bold leading-relaxed">
                          <span className="text-white">{myCurrentStage}단계</span> 진행을 위해<br/>사회자님의 개방을 기다리고 있습니다.
                        </p>
                        <p className="text-sm text-cyan-400 font-medium">다음 단계가 열릴 때까지 잠시 묵상해 주세요.</p>
                      </div>
                    </div>
                  ) : (
                    /* 🌟 정상 작성 창 (글씨 대폭 상향) */
                    <div className="space-y-8 pb-10">
                      <div className="space-y-2">
                        <span className="text-lg font-bold text-cyan-300 block">{myCurrentStage}단계: 제일 먼저 버려야 할 것</span>
                        <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                          <div className="h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all duration-500" style={{ width: `${((myCurrentStage - 1) / 7) * 100}%` }} />
                        </div>
                      </div>

                      <div className="space-y-4">
                        <label className="block text-xl font-black text-slate-200 leading-relaxed break-keep">
                          👉 내가 주님을 위해 먼저 버려야 할 가장 소중한 것을 하나 고르세요:
                        </label>
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[300px] overflow-y-auto p-2 bg-slate-900/40 rounded-2xl custom-scrollbar">
                          {SURRENDER_CATEGORIES.map(c => (
                            <div key={c.id} onClick={()=>{ setSelectedCategory(c.id); playThrottledSound('chime'); }} className={`p-6 rounded-2xl border text-center cursor-pointer transition flex flex-col items-center justify-center gap-3 ${selectedCategory===c.id ? 'bg-cyan-600 border-cyan-300 text-white shadow-lg scale-105':'bg-slate-800 border-slate-700 text-slate-300'}`}>
                              <span className="text-4xl">{c.icon}</span>
                              <span className="text-lg font-bold">{c.title}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      
                      {selectedCategory && (
                        <div className="space-y-4 pt-4 border-t border-slate-700">
                          {/* 🌟 13가지 설명 글씨가 들어가는 부분 */}
                          <div className="bg-black/40 p-4 rounded-xl border border-white/5 flex gap-3">
                            <span className="text-xl">💡</span>
                            <p className="text-sm text-slate-300 font-medium leading-relaxed break-keep">
                              {SURRENDER_CATEGORIES.find(c=>c.id===selectedCategory)?.examples}
                            </p>
                          </div>
                          
                          <textarea rows="3" placeholder="버려야 할 가장 소중한 것을 적어주세요..." value={confessionText} onChange={e=>setConfessionText(e.target.value)} className="w-full bg-slate-950 border-2 border-slate-600 rounded-2xl p-5 text-xl text-white placeholder-slate-400 focus:border-cyan-400" />
                          <button onClick={handleThrowConfession} disabled={isThrowing} className={`w-full py-6 rounded-2xl text-2xl font-black shadow-lg transition-all ${isThrowing ? 'bg-slate-700 text-slate-500' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}>
                            {isThrowing ? '전송 중...' : '🌊 바다로 버리기'}
                          </button>
                        </div>
                      )}
                    </div>
                  )
                ) : (
                  <div className="my-auto bg-slate-900/70 border border-emerald-500/30 p-10 rounded-3xl text-center space-y-6 shadow-2xl mb-10">
                    <span className="text-6xl">✨</span>
                    <h3 className="text-3xl font-black text-emerald-400">7단계 해방 예식 완료!</h3>
                    <p className="text-lg text-slate-300 font-bold leading-relaxed break-keep">나의 가장 소중한 것들을 훌륭히 주님 앞에 버렸습니다! <br />이제 조원들과 함께 전면 대형 스크린을 바라보며 마음 모아 기도합시다.</p>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* 🌟 커스텀 컨펌 모달 (alert/confirm 대체) */}
          {customConfirm.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/85 backdrop-blur-md">
              <div className="bg-slate-900 border-2 border-red-500/30 rounded-3xl max-w-lg w-full p-8 space-y-6 shadow-[0_0_50px_rgba(239,68,68,0.2)]">
                <div className="text-center space-y-3">
                  <span className="text-5xl inline-block animate-bounce">⚠️</span>
                  <h3 className="text-2xl font-extrabold text-red-400">최종 확인</h3>
                  <p className="text-base text-slate-300 leading-relaxed font-semibold">{customConfirm.message}</p>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <button onClick={() => setCustomConfirm({ isOpen: false, message: "", onConfirm: null })} className="py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-lg font-bold">아니오 (취소)</button>
                  <button onClick={customConfirm.onConfirm} className="py-4 bg-red-600 hover:bg-red-500 text-white rounded-xl text-lg font-black shadow-lg">예 (실행)</button>
                </div>
              </div>
            </div>
          )}

          {/* ✨ Gemini AI 위로의 말씀 모달 (참가자용) */}
          {showComfortModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/85 backdrop-blur-md">
              <div className="bg-slate-900 border-2 border-cyan-500/50 rounded-3xl max-w-md w-full p-8 space-y-6 shadow-[0_0_50px_rgba(6,182,212,0.3)]">
                <div className="text-center space-y-4">
                  <span className="text-5xl inline-block animate-pulse">✨</span>
                  <h3 className="text-2xl font-extrabold text-cyan-400">주님의 위로</h3>
                  <div className="min-h-[100px] flex items-center justify-center">
                    {isGeneratingComfort ? (
                      <div className="flex flex-col items-center gap-4">
                        <div className="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-sm text-slate-400 font-bold">성도님의 결단을 묵상하며<br/>위로의 말씀을 준비 중입니다...</p>
                      </div>
                    ) : (
                      <p className="text-lg text-slate-200 leading-relaxed font-medium break-keep">
                        {comfortMessage}
                      </p>
                    )}
                  </div>
                </div>
                {!isGeneratingComfort && (
                  <button onClick={() => setShowComfortModal(false)} className="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-lg font-black shadow-lg transition">
                    아멘 (닫기)
                  </button>
                )}
              </div>
            </div>
          )}

          <style dangerouslySetInnerHTML={{ __html: `
            /* 🌟 다중 카드 2초 체공 후 드롭 애니메이션 */
            @keyframes card-hover-drop { 
              0% { left: 50%; top: 100%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
              10% { left: var(--hover-x); top: var(--hover-y); transform: translate(-50%, -50%) scale(1.1); opacity: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.8); } 
              15% { left: var(--hover-x); top: var(--hover-y); transform: translate(-50%, -50%) scale(1); opacity: 1; } 
              70% { left: var(--hover-x); top: var(--hover-y); transform: translate(-50%, -50%) scale(1); opacity: 1; } 
              85% { left: var(--drop-x); top: 70%; transform: translate(-50%, -50%) scale(0.6); opacity: 0.8; } 
              95% { left: var(--drop-x); top: 75%; transform: translate(-50%, -50%) scale(0); opacity: 0; } 
              100% { opacity: 0; } 
            }
            
            @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes wave { 0% { transform: translateX(0) translateZ(0) scaleY(1); } 50% { transform: translateX(-25%) translateZ(0) scaleY(0.96); } 100% { transform: translateX(-50%) translateZ(0) scaleY(1); } }
            @keyframes splash-ripple { 0% { transform: scale(0.1); opacity: 1; border-width: 4px; } 100% { transform: scale(1.6); opacity: 0; border-width: 1px; } }
            @keyframes droplet-1 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(-20px,-45px,0) scale(1.3); } 100% { transform: translate3d(-30px,20px,0) scale(0.4); opacity:0; } }
            @keyframes droplet-2 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(0,-60px,0) scale(1.3); } 100% { transform: translate3d(0,20px,0) scale(0.4); opacity:0; } }
            @keyframes droplet-3 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(20px,-45px,0) scale(1.3); } 100% { transform: translate3d(30px,20px,0) scale(0.4); opacity:0; } }
            @keyframes float-up-bubble { 0% { transform: translate3d(0, 160px, 0) scale(0.7); opacity: 0; filter: blur(2px); } 8% { opacity: 1; filter: blur(0); } 90% { opacity: 0.95; } 100% { transform: translate3d(var(--float-x, 0px), -80vh, 0) scale(1.05); opacity: 0; filter: blur(4px); } }

            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
          ` }} />

          {toastMessage && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-slate-800 border-2 border-cyan-500 text-cyan-100 px-8 py-4 rounded-full shadow-2xl text-lg font-bold text-center animate-bounce whitespace-nowrap">
              💡 {toastMessage}
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
