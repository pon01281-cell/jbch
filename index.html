<body class="bg-slate-950 text-slate-100 min-h-screen relative overflow-x-hidden overflow-y-auto select-none font-sans">
  
  <div id="root"></div>

  <!-- React Application Code (Babel Script) -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Gemini API 연동 키 (환경에 의해 자동 처리됨) ---
    const apiKey = "";
    
    const callGeminiAPI = async (promptText) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: promptText }] }],
        systemInstruction: { parts: [{ text: "당신은 교회 수련회에서 성도들의 회개와 결단을 돕고 따뜻하게 위로하는 영적 상담가이자 따뜻한 목회자입니다. 항상 한국어로 다정하고 은혜롭게 답변합니다. 사용자가 고백을 하면 그에 맞는 성경적 위로나 기도를 해주세요." }] }
      };

      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "응답을 생성하지 못했습니다.";
        } catch (error) {
          if (i === 4) {
            console.error("Gemini API Error:", error);
            return "현재 AI 위로의 말씀을 불러올 수 없습니다. 마음을 다해 함께 기도하겠습니다.";
          }
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    };

    // --- 🌟 제공해주신 Firebase Config 완벽 이식 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD9m0omYwWSsdpWyAIjHqHE_6ZHxnDQ8F4",
      authDomain: "church-71d03.firebaseapp.com",
      projectId: "church-71d03",
      storageBucket: "church-71d03.firebasestorage.app",
      messagingSenderId: "700068495005",
      appId: "1:700068495005:web:43a7cc6cc6721510ac1e74",
      measurementId: "G-4LY0TV8LQN"
    };

    // --- Web Audio API 기반 효과음 엔진 ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        if (type === 'splash') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, now);
          osc.frequency.exponentialRampToValueAtTime(28, now + 1.3);
          gain.gain.setValueAtTime(0.45, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 1.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.4);
        } else if (type === 'chime') {
          const notes = [523.25, 659.25, 783.99, 1046.50]; 
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.12);
            gain.gain.setValueAtTime(0.18, now + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.12 + 0.85);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.12);
            osc.stop(now + idx * 0.12 + 0.95);
          });
        } else if (type === 'triumph') {
          const chords = [261.63, 329.63, 392.00, 523.25];
          chords.forEach((freq) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.8, now + 2.0);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(now + 2.5);
          });
        }
      } catch (e) {
        console.warn("오디오 엔진 비활성화:", e);
      }
    };

    // --- 13가지 성찰 카테고리 정의 ---
    const SURRENDER_CATEGORIES = [
      { id: 'word', title: '말씀', icon: '📖', examples: '읽기, 듣기, 암송, 묵상, 순종, 실천함으로 내 말씀으로 만들기 등' },
      { id: 'prayer', title: '기도', icon: '🙏', examples: '매일 하는 기도, 회개 기도, 영혼을 위한 기도, 순종하기 위한 기도 등' },
      { id: 'church', title: '교회', icon: '⛪', examples: '육신을 이기고 교제 참석, 우선순위가 교회가 먼저, 서로 돌아봄 등' },
      { id: 'evangelism', title: '전도', icon: '📣', examples: '영혼을 사랑하는 마음 갖기, 주변 사람에게 관심 갖기 등' },
      { id: 'reward', title: '상급', icon: '👑', examples: '세상의 좋은 것보다 하늘의 상급 사모함, 그리스도인의 심판대 기억하기 등' },
      { id: 'career', title: '직장/학업', icon: '💼', examples: '사회적 명예와 위치, 인정받고 싶은 열망, 학점, 꿈과 진로 등' },
      { id: 'money', title: '돈/물질', icon: '💵', examples: '안정적인 삶, 결혼자금, 적금, 탐심, 내가 사고 싶은 물질적 욕구 등' },
      { id: 'flesh', title: '외모/육신', icon: '🏋️', examples: '외모 관리, 운동, 건강 염려증, 나태함, 게으름, 육신적 쾌락 즐기기 등' },
      { id: 'nature', title: '고집/본성', icon: '👤', examples: '내 고집, 아집, 자존심, 이기심, 교만함, 시기와 질투, 험담, 사나움 등' },
      { id: 'hobby', title: '취미/즐거움', icon: '🎮', examples: '넷플릭스/유튜브 시청, 인스타 구경, 맛집 탐방, 게임 중독 등' },
      { id: 'family', title: '가족', icon: '🏡', examples: '가족, 배우자에 대한 집착, 가족만의 시간 보장 등' },
      { id: 'friend', title: '친구/인정', icon: '🤝', examples: '인정받고 싶은 조바심, 우정에 대한 과도한 집착, 어울려 놀기만 하려는 성향 등' },
      { id: 'comfort', title: '안락함', icon: '🛌', examples: '잠, 끝없는 휴식, 멍 때리기, 침대 밖으로 안 나가기, 누워 있기만 함 등' }
    ];

    function App() {
      const appId = 'titanic-church-app-v7';
      const [user, setUser] = useState(null);
      const [isOnline, setIsOnline] = useState(false);
      const [loading, setLoading] = useState(true);

      const [role, setRole] = useState('select'); // select, screen, host, participant
      const [globalStage, setGlobalStage] = useState(1);
      const [participants, setParticipants] = useState([]);
      const [surrenders, setSurrenders] = useState([]);

      const [hostMode, setHostMode] = useState('collective');
      const [selectedParticipantId, setSelectedParticipantId] = useState(null);
      const [manualStage, setManualStage] = useState(0); 

      const [nickname, setNickname] = useState('');
      const [hasRegistered, setHasRegistered] = useState(false);
      const [myCurrentStage, setMyCurrentStage] = useState(1);
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [confessionText, setConfessionText] = useState('');
      const [myHistory, setMyHistory] = useState([]);
      const [isThrowing, setIsThrowing] = useState(false);

      const [flingingCards, setFlingingCards] = useState([]);
      const [splashes, setSplashes] = useState([]);
      const [floatingWords, setFloatingWords] = useState([]);
      const [activeNotice, setActiveNotice] = useState(null);

      // ✨ Gemini AI 기능 상태 추가
      const [comfortMessage, setComfortMessage] = useState('');
      const [isGeneratingComfort, setIsGeneratingComfort] = useState(false);
      const [showComfortModal, setShowComfortModal] = useState(false);
      const [hostPrayer, setHostPrayer] = useState('');
      const [isGeneratingPrayer, setIsGeneratingPrayer] = useState(false);

      const [customConfirm, setCustomConfirm] = useState({ isOpen: false, message: "", onConfirm: null });

      const isInitialLoadRef = useRef(true);
      const seenSurrenderIdsRef = useRef(new Set());
      const lastAudioTimeRef = useRef(0);
      const dbRef = useRef(null);
      const slotRef = useRef(0);

      const [toastMessage, setToastMessage] = useState('');
      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 4000);
      };

      // --- 🌟 Firebase 실시간 엔진 초기화 ---
      useEffect(() => {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          const auth = firebase.auth();
          const db = firebase.firestore();
          dbRef.current = db;
          
          auth.signInAnonymously()
            .then(() => setIsOnline(true))
            .catch((err) => {
              console.error("Firebase 로그인 실패:", err);
              if(err.code === 'auth/operation-not-allowed') {
                showToast("❌ Firebase 콘솔에서 'Authentication -> 익명 로그인'을 꼭 켜주세요!");
              } else {
                showToast("❌ 인터넷 연결 오류. 로컬 모드로 동작합니다.");
              }
              setIsOnline(false);
            });

          const unsubscribeAuth = auth.onAuthStateChanged((u) => {
            if (u) {
              setUser(u);
              setLoading(false);
              showToast("🛰️ 구글 서버와 실시간 통신이 연결되었습니다.");
            } else {
              setLoading(false);
            }
          });

          return () => unsubscribeAuth();
        } catch (e) {
          console.error("Firebase 초기화 에러:", e);
          setIsOnline(false);
          setLoading(false);
        }
      }, []);

      // --- 🌟 실시간 데이터베이스 연동 ---
      useEffect(() => {
        if (!isOnline || !user || !dbRef.current) return;

        const sessionRef = dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session');
        const unsubSession = sessionRef.onSnapshot((docSnap) => {
          if (docSnap.exists && docSnap.data().currentStage !== undefined) {
            setGlobalStage(docSnap.data().currentStage);
          } else {
            sessionRef.set({ currentStage: 1 });
          }
        }, err => console.log("규칙 설정 오류:", err));

        const partsRef = dbRef.current.collection('artifacts').doc(appId).collection('participants');
        const unsubParticipants = partsRef.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((d) => list.push({ id: d.id, ...d.data() }));
          setParticipants(list);
        });

        const surrRef = dbRef.current.collection('artifacts').doc(appId).collection('surrenders');
        const unsubSurrenders = surrRef.onSnapshot((snapshot) => {
          const list = [];
          const newItems = [];

          snapshot.forEach((d) => {
            const docId = d.id;
            const data = d.data();
            list.push({ id: docId, ...data });

            if (isInitialLoadRef.current) {
              seenSurrenderIdsRef.current.add(docId);
            } else {
              if (!seenSurrenderIdsRef.current.has(docId)) {
                seenSurrenderIdsRef.current.add(docId);
                newItems.push({ id: docId, ...data });
              }
            }
          });

          if (isInitialLoadRef.current) isInitialLoadRef.current = false;

          list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
          setSurrenders(list);

          newItems.forEach((item, index) => {
            setTimeout(() => { triggerPhysicalLaunch(item); }, index * 500); // 0.5초 간격 발사
          });
        });

        return () => {
          unsubSession();
          unsubParticipants();
          unsubSurrenders();
        };
      }, [isOnline, user]);

      const playThrottledSound = (type) => {
        const now = Date.now();
        if (now - lastAudioTimeRef.current > 150) {
          playSound(type);
          lastAudioTimeRef.current = now;
        }
      };

      // --- 🌟 물리 애니메이션 (다중 구역 2초 체공 팝업) ---
      const triggerPhysicalLaunch = (item) => {
        const flingId = `fling_${Date.now()}_${Math.random()}`;
        
        // 화면을 6개 구역으로 나누어 카드가 겹치지 않게 배치
        const slotIndex = slotRef.current % 6;
        slotRef.current += 1;
        
        const row = Math.floor(slotIndex / 3); // 0, 1 (상/중)
        const col = slotIndex % 3; // 0, 1, 2 (좌/중/우)
        
        const hoverX = 20 + (col * 30) + (Math.random() * 6 - 3); 
        const hoverY = 15 + (row * 30) + (Math.random() * 8 - 4); 
        const dropX = hoverX;

        const categoryObj = SURRENDER_CATEGORIES.find(c => c.id === item.category);

        const newCard = {
          id: flingId, 
          text: item.text, 
          categoryTitle: categoryObj?.title || '성찰',
          categoryIcon: categoryObj?.icon || '⚓', 
          nickname: item.nickname || '익명성도',
          hoverX: `${hoverX}%`, 
          hoverY: `${hoverY}%`, 
          dropX: `${dropX}%`
        };

        // 카드 생성 (CSS에서 2.5초 체공 후 드롭)
        setFlingingCards(prev => [...prev.slice(-15), newCard]);

        // 3초 시점에 물보라 충돌
        setTimeout(() => {
          const splashId = `splash_${Date.now()}_${Math.random()}`;
          setSplashes(prev => [...prev, { id: splashId, x: `${dropX}%` }]);
          playThrottledSound('splash');

          setTimeout(() => setSplashes(prev => prev.filter(s => s.id !== splashId)), 1000);

          setTimeout(() => {
            const bubbleId = `bubble_${Date.now()}_${Math.random()}`;
            const riseDuration = 8 + Math.random() * 3;

            const newBubble = {
              id: bubbleId, text: item.text, categoryTitle: categoryObj?.title || '성찰',
              nickname: item.nickname || '익명', x: `${dropX}%`, size: 16 + Math.random() * 6, duration: riseDuration
            };

            setFloatingWords(prev => [...prev, newBubble]);
            setTimeout(() => setFloatingWords(prev => prev.filter(b => b.id !== bubbleId)), riseDuration * 1000);
          }, 200);

        }, 3000);

        // 3.5초에 카드 삭제
        setTimeout(() => {
          setFlingingCards(prev => prev.filter(c => c.id !== flingId));
        }, 3500);
      };

      const updateGlobalStage = (nextVal) => {
        if (nextVal < 1 || nextVal > 7) return;
        playThrottledSound('chime');
        setGlobalStage(nextVal);

        if (isOnline && dbRef.current) {
          dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session')
            .update({ currentStage: nextVal }).catch(e => console.log(e));
        } else {
          showToast(`단계를 ${nextVal}단계로 로컬 변경했습니다.`);
        }
      };

      const handleThrowConfession = () => {
        if (!selectedCategory || !confessionText.trim()) return;

        setIsThrowing(true);
        const textToThrow = confessionText.trim();
        const catObj = SURRENDER_CATEGORIES.find(c => c.id === selectedCategory);
        const stageNum = myCurrentStage;

        setTimeout(() => {
          const newSurrenderItem = { category: selectedCategory, categoryTitle: catObj?.title || '소중한 것', text: textToThrow, stage: stageNum };
          const updatedHistory = [...myHistory, newSurrenderItem];
          setMyHistory(updatedHistory);

          const nextStage = myCurrentStage + 1;
          setMyCurrentStage(nextStage);
          setSelectedCategory(null);
          setConfessionText('');
          setIsThrowing(false);

          if (nextStage === 8) playThrottledSound('triumph');
          else playThrottledSound('chime');

          // ✨ Gemini 위로의 말씀 요청
          setShowComfortModal(true);
          setIsGeneratingComfort(true);
          setComfortMessage('');
          callGeminiAPI(`다음은 한 성도가 십자가 앞에 내려놓은 고백입니다: "${textToThrow}". 이 성도를 위해 성경적이고 따뜻한 위로의 말과 짧은 축복의 기도를 3문장 이내로 다정하게 작성해주세요.`)
            .then(msg => {
              setComfortMessage(msg);
              setIsGeneratingComfort(false);
            });

          if (isOnline && dbRef.current && user) {
            dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).set({
              nickname: nickname, currentStage: nextStage, items: updatedHistory, lastActive: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            dbRef.current.collection('artifacts').doc(appId).collection('surrenders').add({
              text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
          } else {
            setParticipants(prev => prev.map(p => p.id === 'local_me' ? { ...p, currentStage: nextStage, items: updatedHistory } : p));
            triggerPhysicalLaunch({ text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname });
            setSurrenders(prev => [{ id: `local_${Date.now()}`, text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname }, ...prev]);
          }
        }, 1500);
      };

      const handleJoinRetreat = (e) => {
        e.preventDefault();
        if (!nickname.trim()) return;
        setHasRegistered(true);
        setMyCurrentStage(1);

        if (isOnline && dbRef.current && user) {
          dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).set({
            nickname: nickname.trim(), currentStage: 1, items: [], lastActive: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        } else {
          setParticipants(prev => [...prev, { id: 'local_me', nickname: nickname.trim(), currentStage: 1, items: [] }]);
          showToast(`${nickname}님 환영합니다.`);
        }
      };

      const stats = useMemo(() => {
        const activePeople = participants.filter(p => p.nickname);
        if (activePeople.length === 0) return { avgStage: 0, totalPeople: 0, totalSurrenders: 0, stageReadyCount: 0 };
        
        const readyForNext = activePeople.filter(p => p.currentStage > globalStage).length;
        const totalCompletedSurrenders = activePeople.reduce((acc, curr) => acc + (curr.currentStage - 1), 0);
        const maxPossibleSurrenders = activePeople.length * 7;
        
        const continuousRatio = maxPossibleSurrenders > 0 ? (totalCompletedSurrenders / maxPossibleSurrenders) : 0;
        const continuousStage = continuousRatio * 7; 

        return { avgStage: continuousStage, totalPeople: activePeople.length, totalSurrenders: totalCompletedSurrenders, stageReadyCount: readyForNext };
      }, [participants, globalStage]);

      const currentVisualStage = useMemo(() => {
        if (hostMode === 'manual') return manualStage;
        if (hostMode === 'individual') {
          const sel = participants.find(p => p.id === selectedParticipantId);
          return sel ? Math.max(0, sel.currentStage - 1) : 0;
        }
        return stats.avgStage;
      }, [hostMode, manualStage, selectedParticipantId, participants, stats.avgStage]);

      const triggerResetSessions = () => {
        setCustomConfirm({
          isOpen: true,
          message: "⚠️ 예배 전체 성찰 기록과 타이타닉 부상 상태를 모두 리셋하시겠습니까?",
          onConfirm: async () => {
            if (isOnline && dbRef.current) {
              dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session').set({ currentStage: 1 });
              participants.forEach(p => dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(p.id).delete());
              surrenders.forEach(s => dbRef.current.collection('artifacts').doc(appId).collection('surrenders').doc(s.id).delete());
            }
            setParticipants([]);
            setSurrenders([]);
            setGlobalStage(1);
            setFlingingCards([]);
            setSplashes([]);
            setFloatingWords([]);
            showToast("수련회 전체 연동 정보 복구 완료.");
            setCustomConfirm({ isOpen: false, message: "", onConfirm: null });
          }
        });
      };

      const injectMockParticipants = () => {
