  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 🌟 제공해주신 Firebase Config 완벽 이식 ---
    const firebaseConfig = {

    // --- Web Audio API 효과음 엔진 ---
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        if (type === 'splash') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, now);
          osc.frequency.exponentialRampToValueAtTime(28, now + 1.3);
          gain.gain.setValueAtTime(0.45, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 1.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.4);
        } else if (type === 'chime') {
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.12);
            gain.gain.setValueAtTime(0.18, now + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.12 + 0.85);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + idx * 0.12);
            osc.stop(now + idx * 0.12 + 0.95);
          });
        } else if (type === 'triumph') {
          const chords = [261.63, 329.63, 392.00, 523.25];
          chords.forEach((freq) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.8, now + 2.0);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 2.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(now + 2.5);
          });
        }
      } catch (e) {
        console.warn("오디오 엔진 동작 비활성화:", e);
      }
    };

    // --- 13가지 성찰 카테고리 정의 ---
    const SURRENDER_CATEGORIES = [
      { id: 'word', title: '말씀', icon: '📖', examples: '읽기, 듣기, 암송, 묵상, 순종, 실천함으로 내 말씀으로 만들기 등' },
      { id: 'prayer', title: '기도', icon: '🙏', examples: '매일 하는 기도, 회개 기도, 영혼을 위한 기도, 순종하기 위한 기도 등' },
      { id: 'church', title: '교회', icon: '⛪', examples: '육신을 이기고 교제 참석, 우선순위가 교회가 먼저, 서로 돌아봄 등' },
      { id: 'evangelism', title: '전도', icon: '📣', examples: '영혼을 사랑하는 마음 갖기, 주변 사람에게 관심 갖기 등' },
      { id: 'reward', title: '상급', icon: '👑', examples: '세상의 좋은 것보다 하늘의 상급 사모함, 그리스도인의 심판대 기억하기 등' },
      { id: 'career', title: '직장/학업', icon: '💼', examples: '사회적 명예와 위치, 인정받고 싶은 열망, 학점, 꿈과 진로 등' },
      { id: 'money', title: '돈', icon: '💵', examples: '안정적인 삶, 결혼자금, 적금, 탐심, 내가 사고 싶은 물질적 욕구 등' },
      { id: 'flesh', title: '육신', icon: '🏋️', examples: '외모 관리, 운동, 건강 염려증, 나태함, 게으름, 육신적 쾌락 즐기기 등' },
      { id: 'nature', title: '본성', icon: '👤', examples: '내 고집, 아집, 자존심, 이기심, 교만함, 시기와 질투, 험담, 사나움 등' },
      { id: 'hobby', title: '취미', icon: '🎮', examples: '넷플릭스/유튜브 시청, 인스타 구경, 맛집 탐방, 게임 중독 등' },
      { id: 'family', title: '가족', icon: '🏡', examples: '가족, 배우자에 대한 집착, 가족만의 시간 보장 등' },
      { id: 'friend', title: '친구', icon: '🤝', examples: '인정받고 싶은 조바심, 우정에 대한 과도한 집착, 어울려 놀기만 하려는 성향 등' },
      { id: 'comfort', title: '편안함', icon: '🛌', examples: '잠, 끝없는 휴식, 멍 때리기, 침대 밖으로 안 나가기, 누워 있기만 함 등' }
    ];

    function App() {
      const appId = 'titanic-church-app';
      const [user, setUser] = useState(null);
      const [isOnline, setIsOnline] = useState(false);
      const [loading, setLoading] = useState(true);

      const [role, setRole] = useState('select'); 
      const [globalStage, setGlobalStage] = useState(1);
      const [participants, setParticipants] = useState([]);
      const [surrenders, setSurrenders] = useState([]);

      const [hostMode, setHostMode] = useState('collective');
      const [selectedParticipantId, setSelectedParticipantId] = useState(null);
      const [manualStage, setManualStage] = useState(0); 

      const [nickname, setNickname] = useState('');
      const [hasRegistered, setHasRegistered] = useState(false);
      const [myCurrentStage, setMyCurrentStage] = useState(1);
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [confessionText, setConfessionText] = useState('');
      const [myHistory, setMyHistory] = useState([]);
      const [isThrowing, setIsThrowing] = useState(false);

      const [flingingCards, setFlingingCards] = useState([]);
      const [splashes, setSplashes] = useState([]);
      const [floatingWords, setFloatingWords] = useState([]);
      const [activeNotice, setActiveNotice] = useState(null);

      const [customConfirm, setCustomConfirm] = useState({ isOpen: false, message: "", onConfirm: null });

      const isInitialLoadRef = useRef(true);
      const seenSurrenderIdsRef = useRef(new Set());
      const lastAudioTimeRef = useRef(0);
      const dbRef = useRef(null);

      const [toastMessage, setToastMessage] = useState('');
      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      // --- 🌟 Firebase 실시간 엔진 초기화 (강력한 예외처리 추가) ---
      useEffect(() => {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          const auth = firebase.auth();
          const db = firebase.firestore();
          dbRef.current = db;
          
          // 1. 익명 로그인 수행
          auth.signInAnonymously()
            .then(() => setIsOnline(true))
            .catch((err) => {
              console.error("Firebase 로그인 거부 에러:", err);
              if(err.code === 'auth/operation-not-allowed') {
                showToast("❌ [중요] Firebase 콘솔에서 '익명 로그인'을 켜주세요!");
              } else {
                showToast("❌ 서버 연결 실패 (로컬 모드 가동 중)");
              }
              setIsOnline(false);
            });

          // 2. 로그인 상태 구독
          const unsubscribeAuth = auth.onAuthStateChanged((u) => {
            if (u) {
              setUser(u);
              setLoading(false);
              showToast("🛰️ 클라우드 서버와 성공적으로 연결되었습니다.");
            } else {
              setLoading(false);
            }
          });

          return () => unsubscribeAuth();
        } catch (e) {
          console.error("Firebase 초기화 에러:", e);
          setIsOnline(false);
          setLoading(false);
        }
      }, []);

      // --- 🌟 실시간 데이터베이스 연동 구독 ---
      useEffect(() => {
        if (!isOnline || !user || !dbRef.current) return;

        // 세션 데이터
        const sessionRef = dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session');
        const unsubSession = sessionRef.onSnapshot((docSnap) => {
          if (docSnap.exists && docSnap.data().currentStage !== undefined) {
            setGlobalStage(docSnap.data().currentStage);
          } else {
            sessionRef.set({ currentStage: 1 });
          }
        }, (err) => {
          console.error("규칙 거부 에러:", err);
          showToast("❌ [중요] Firestore 규칙을 allow read, write: if true; 로 바꿔주세요!");
        });

        // 참가자 명단
        const partsRef = dbRef.current.collection('artifacts').doc(appId).collection('participants');
        const unsubParticipants = partsRef.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((d) => list.push({ id: d.id, ...d.data() }));
          setParticipants(list);
        });

        // 참회 고백 
        const surrRef = dbRef.current.collection('artifacts').doc(appId).collection('surrenders');
        const unsubSurrenders = surrRef.onSnapshot((snapshot) => {
          const list = [];
          const newItems = [];

          snapshot.forEach((d) => {
            const docId = d.id;
            const data = d.data();
            list.push({ id: docId, ...data });

            if (isInitialLoadRef.current) {
              seenSurrenderIdsRef.current.add(docId);
            } else {
              if (!seenSurrenderIdsRef.current.has(docId)) {
                seenSurrenderIdsRef.current.add(docId);
                newItems.push({ id: docId, ...data });
              }
            }
          });

          if (isInitialLoadRef.current) isInitialLoadRef.current = false;

          list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
          setSurrenders(list);

          newItems.forEach((item, index) => {
            setTimeout(() => { triggerPhysicalLaunch(item); }, index * 400);
          });
        });

        return () => {
          unsubSession();
          unsubParticipants();
          unsubSurrenders();
        };
      }, [isOnline, user]);

      const playThrottledSound = (type) => {
        const now = Date.now();
        if (now - lastAudioTimeRef.current > 150) {
          playSound(type);
          lastAudioTimeRef.current = now;
        }
      };

      // --- 물리 애니메이션 투하 발동기 ---
      const triggerPhysicalLaunch = (item) => {
        const flingId = `fling_${Date.now()}_${Math.random()}`;
        const targetSideLeft = Math.random() > 0.5;
        
        const finalX = targetSideLeft ? (12 + Math.random() * 26) : (62 + Math.random() * 26);
        const apexX = targetSideLeft ? (50 - (50 - finalX) / 2) : (50 + (finalX - 50) / 2);
        const apexY = 10 + Math.random() * 12;
        const rotMid = targetSideLeft ? -130 : 130;
        const rotEnd = targetSideLeft ? -360 : 360;
        const categoryObj = SURRENDER_CATEGORIES.find(c => c.id === item.category);

        const newCard = {
          id: flingId, text: item.text, categoryTitle: categoryObj?.title || '성찰',
          categoryIcon: categoryObj?.icon || '⚓', nickname: item.nickname || '익명성도',
          apexX: `${apexX}%`, apexY: `${apexY}%`, targetX: `${finalX}%`, rotMid: `${rotMid}deg`, rotEnd: `${rotEnd}deg`
        };

        // 대강당 전광판 소환
        setActiveNotice({
          categoryIcon: newCard.categoryIcon, categoryTitle: newCard.categoryTitle, text: newCard.text, nickname: newCard.nickname
        });

        setTimeout(() => setActiveNotice(null), 4000);

        setFlingingCards(prev => [...prev.slice(-15), newCard]);

        setTimeout(() => {
          setFlingingCards(prev => prev.filter(c => c.id !== flingId));
          const splashId = `splash_${Date.now()}_${Math.random()}`;
          setSplashes(prev => [...prev, { id: splashId, x: `${finalX}%` }]);
          playThrottledSound('splash');

          setTimeout(() => setSplashes(prev => prev.filter(s => s.id !== splashId)), 1000);

          setTimeout(() => {
            const bubbleId = `bubble_${Date.now()}_${Math.random()}`;
            const riseDuration = 9 + Math.random() * 3;

            const newBubble = {
              id: bubbleId, text: item.text, categoryTitle: categoryObj?.title || '성찰',
              nickname: item.nickname || '익명', x: `${finalX}%`, size: 15 + Math.random() * 6, duration: riseDuration
            };

            setFloatingWords(prev => [...prev, newBubble]);
            setTimeout(() => setFloatingWords(prev => prev.filter(b => b.id !== bubbleId)), riseDuration * 1000);
          }, 200);

        }, 1500);
      };

      // 단계 업데이트
      const updateGlobalStage = (nextVal) => {
        if (nextVal < 1 || nextVal > 7) return;
        playThrottledSound('chime');
        setGlobalStage(nextVal);

        if (isOnline && dbRef.current) {
          dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session')
            .update({ currentStage: nextVal }).catch(e => console.log(e));
        } else {
          showToast(`단계를 ${nextVal}단계로 변경했습니다. (로컬모드)`);
        }
      };

      // 참가자 참회 투하 전송
      const handleThrowConfession = () => {
        if (!selectedCategory || !confessionText.trim()) return;

        setIsThrowing(true);
        const textToThrow = confessionText.trim();
        const catObj = SURRENDER_CATEGORIES.find(c => c.id === selectedCategory);
        const stageNum = myCurrentStage;

        setTimeout(() => {
          const newSurrenderItem = { category: selectedCategory, categoryTitle: catObj?.title || '성찰', text: textToThrow, stage: stageNum };
          const updatedHistory = [...myHistory, newSurrenderItem];
          setMyHistory(updatedHistory);

          const nextStage = myCurrentStage + 1;
          setMyCurrentStage(nextStage);
          setSelectedCategory(null);
          setConfessionText('');
          setIsThrowing(false);

          if (nextStage === 8) playThrottledSound('triumph');
          else playThrottledSound('chime');

          // 클라우드 서버에 저장 (실시간 동기화)
          if (isOnline && dbRef.current && user) {
            dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).set({
              nickname: nickname, currentStage: nextStage, items: updatedHistory, lastActive: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            dbRef.current.collection('artifacts').doc(appId).collection('surrenders').add({
              text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
          } else {
            setParticipants(prev => prev.map(p => p.id === 'local_me' ? { ...p, currentStage: nextStage, items: updatedHistory } : p));
            triggerPhysicalLaunch({ text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname });
            setSurrenders(prev => [{ id: `local_${Date.now()}`, text: textToThrow, category: selectedCategory, stage: stageNum, nickname: nickname }, ...prev]);
          }
        }, 1500);
      };

      const handleJoinRetreat = (e) => {
        e.preventDefault();
        if (!nickname.trim()) return;
        setHasRegistered(true);
        setMyCurrentStage(1);

        if (isOnline && dbRef.current && user) {
          dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(user.uid).set({
            nickname: nickname.trim(), currentStage: 1, items: [], lastActive: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        } else {
          setParticipants(prev => [...prev, { id: 'local_me', nickname: nickname.trim(), currentStage: 1, items: [] }]);
          showToast(`${nickname}님 오프라인으로 입장하셨습니다.`);
        }
      };

      // 통계 계산 로직 (부상 깊이 반영)
      const stats = useMemo(() => {
        const activePeople = participants.filter(p => p.nickname);
        if (activePeople.length === 0) return { avgStage: 0, totalPeople: 0, totalSurrenders: 0, stageReadyCount: 0 };
        
        const readyForNext = activePeople.filter(p => p.currentStage > globalStage).length;
        const totalCompletedSurrenders = activePeople.reduce((acc, curr) => acc + (curr.currentStage - 1), 0);
        const maxPossibleSurrenders = activePeople.length * 7;
        
        const continuousRatio = maxPossibleSurrenders > 0 ? (totalCompletedSurrenders / maxPossibleSurrenders) : 0;
        const continuousStage = continuousRatio * 7; 

        return { avgStage: continuousStage, totalPeople: activePeople.length, totalSurrenders: totalCompletedSurrenders, stageReadyCount: readyForNext };
      }, [participants, globalStage]);

      const currentVisualStage = useMemo(() => {
        if (hostMode === 'manual') return manualStage;
        if (hostMode === 'individual') {
          const sel = participants.find(p => p.id === selectedParticipantId);
          return sel ? Math.max(0, sel.currentStage - 1) : 0;
        }
        return stats.avgStage;
      }, [hostMode, manualStage, selectedParticipantId, participants, stats.avgStage]);

      // 커스텀 리셋 모달
      const triggerResetSessions = () => {
        setCustomConfirm({
          isOpen: true,
          message: "⚠️ 수련회 전체 성찰 기록과 타이타닉 부상 상태를 모두 초기화하시겠습니까? (새로운 예배 시작 시 권장)",
          onConfirm: async () => {
            if (isOnline && dbRef.current) {
              dbRef.current.collection('artifacts').doc(appId).collection('public').doc('session').set({ currentStage: 1 });
              participants.forEach(p => dbRef.current.collection('artifacts').doc(appId).collection('participants').doc(p.id).delete());
              surrenders.forEach(s => dbRef.current.collection('artifacts').doc(appId).collection('surrenders').doc(s.id).delete());
            }
            setParticipants([]);
            setSurrenders([]);
            setGlobalStage(1);
            setFlingingCards([]);
            setSplashes([]);
            setFloatingWords([]);
            showToast("수련회 전체 연동 정보 복구 완료.");
            setCustomConfirm({ isOpen: false, message: "", onConfirm: null });
          }
        });
      };

      const injectMockParticipants = () => {
        const mockNames = ["김요한", "이은혜", "박찬양", "최성찰", "정성령", "임예배", "홍기도", "송기쁨", "한믿음", "배소망"];
        const mockSurrenders = [
          { category: 'hobby', text: '매일 새벽까지 스마트폰 쇼츠 보느라 무뎌진 신앙생활' },
          { category: 'nature', text: '친구가 잘 되는 것을 시기하고 미워하며 험담했던 마음' },
          { category: 'money', text: '세상의 물질과 탐심에 빠져 주님 안전망을 거부한 죄' },
          { category: 'career', text: '학업 결과에 지나치게 집착하여 미래를 두려워하는 불신' },
          { category: 'friend', text: '주변 사람들에게 무시당할까봐 전전긍긍하며 거짓가식을 세우는 죄' }
        ];

        const mockList = mockNames.map((name, index) => {
          return { id: `mock_user_${index}`, nickname: name, currentStage: Math.floor(Math.random() * 6) + 1, items: [], lastActive: new Date() };
        });
        setParticipants(mockList);

        const mockSurrenderCollection = [];
        for (let i = 0; i < 15; i++) {
          const randomObj = mockSurrenders[Math.floor(Math.random() * mockSurrenders.length)];
          mockSurrenderCollection.push({
            id: `mock_item_${i}`, text: randomObj.text, category: randomObj.category, stage: Math.floor(Math.random() * 5) + 1,
            nickname: mockNames[i % mockNames.length], timestamp: { seconds: Math.floor(Date.now() / 1000) - i * 15 }
          });
        }
        setSurrenders(mockSurrenderCollection);
        showToast("모의 가상인원 주입이 완료되었습니다.");
      };

      const handleForceTestFloat = () => {
        const testWords = [
          { text: "예배 때 은근히 졸며 귀찮아하던 게으름", cat: "flesh" },

                      )}
                    </div>
                  )
                ) : (
                  <div className="my-auto bg-slate-900/70 border border-emerald-500/30 p-8 rounded-2xl text-center space-y-4 shadow-2xl mb-10">
                    <span className="text-3xl">✨</span>
                    <h3 className="text-base font-bold text-emerald-400">7단계 해방 예식 완료!</h3>
                    <p className="text-xs text-slate-300 font-bold">모든 짐을 훌륭히 주님 앞에 버렸습니다! <br />이제 조원들과 함께 전면 대형 스크린을 바라보며 마음 모아 기도합시다.</p>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* 🌟 커스텀 컨펌 모달 (alert/confirm 대체) */}
          {customConfirm.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-md">
              <div className="bg-slate-900 border-2 border-red-500/30 rounded-2xl max-w-md w-full p-6 space-y-5 shadow-[0_0_50px_rgba(239,68,68,0.2)] animate-[bounce_0.4s_ease-out_forwards]">
                <div className="text-center space-y-2">
                  <span className="text-3.5xl inline-block animate-bounce">⚠️</span>
                  <h3 className="text-base font-extrabold text-red-400">데이터 초기화 최종 확인</h3>
                  <p className="text-xs text-slate-300 leading-relaxed font-semibold">{customConfirm.message}</p>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => setCustomConfirm({ isOpen: false, message: "", onConfirm: null })} className="py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold transition border border-white/5">아니오 (취소)</button>
                  <button onClick={customConfirm.onConfirm} className="py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl text-xs font-black shadow-lg shadow-red-600/25 transition">예 (포맷 리셋)</button>
                </div>
              </div>
            </div>
          )}

          <style>{`
            @keyframes wave { 0% { transform: translateX(0) translateZ(0) scaleY(1); } 50% { transform: translateX(-25%) translateZ(0) scaleY(0.96); } 100% { transform: translateX(-50%) translateZ(0) scaleY(1); } }
            @keyframes fling-arc-custom { 0% { left: 50%; top: 40%; transform: translate3d(-50%, -50%, 0) rotate(0deg) scale(0.3); opacity: 0; } 10% { opacity: 1; } 35% { top: var(--apex-y); left: var(--apex-x); transform: translate3d(-50%, -50%, 0) rotate(var(--rot-mid)) scale(1.15); } 90% { opacity: 0.95; } 100% { left: var(--target-x); top: 70%; transform: translate3d(-50%, -50%, 0) rotate(var(--rot-end)) scale(0.4); opacity: 0; } }
            @keyframes splash-ripple { 0% { transform: scale(0.1); opacity: 1; border-width: 4px; } 100% { transform: scale(1.6); opacity: 0; border-width: 1px; } }
            @keyframes droplet-1 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(-20px,-45px,0) scale(1.3); } 100% { transform: translate3d(-30px,20px,0) scale(0.4); opacity:0; } }
            @keyframes droplet-2 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(0,-60px,0) scale(1.3); } 100% { transform: translate3d(0,20px,0) scale(0.4); opacity:0; } }
            @keyframes droplet-3 { 0% { transform: translate3d(0,0,0) scale(1); opacity: 1; } 40% { transform: translate3d(20px,-45px,0) scale(1.3); } 100% { transform: translate3d(30px,20px,0) scale(0.4); opacity:0; } }
            @keyframes float-up-bubble { 0% { transform: translate3d(0, 160px, 0) scale(0.7); opacity: 0; filter: blur(2px); } 8% { opacity: 1; filter: blur(0); } 90% { opacity: 0.95; } 100% { transform: translate3d(var(--float-x, 0px), -80vh, 0) scale(1.05); opacity: 0; filter: blur(4px); } }
          `}</style>

          {toastMessage && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 border border-cyan-500/50 text-cyan-200 px-5 py-3 rounded-xl shadow-2xl text-xs font-bold text-center animate-bounce">
              💡 {toastMessage}
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
